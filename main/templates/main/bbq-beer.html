<!DOCTYPE html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBQ &amp; Beer - Smokey Peeks</title>
    <link rel="stylesheet" href="{% static 'main/css/homepage.css' %}" />
  </head>
  <body class="subpage">
    <nav class="main-nav">
      <div class="nav-inner">
        <a href="{% url 'main:home' %}" class="brand">
          <img src="{% static 'main/img/logo no bg.png' %}" alt="Smokey Peeks logo" class="brand-logo" />
          <span class="brand-text">
            <span class="brand-name">Smokey Peeks</span>
            <span class="brand-tagline">BBQ &amp; Beer</span>
          </span>
        </a>
      </div>
    </nav>

    <main class="subpage-main">
      <section class="subpage-hero">
        <h1>BBQ &amp; Beer</h1>
        <p>Signature smoked favorites paired with your go-to cold brews.</p>
        <a href="{% url 'main:home' %}#reservations" class="btn btn-primary">
          Book a table
        </a>
      </section>
    </main>
  </body>
</html>
