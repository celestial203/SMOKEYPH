<!DOCTYPE html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merch - Smokey Peeks</title>
    <link rel="stylesheet" href="{% static 'main/css/homepage.css' %}" />
  </head>
  <body class="subpage">
    <nav class="main-nav">
      <div class="nav-inner">
        <a href="{% url 'main:home' %}" class="brand">
          <img src="{% static 'main/img/logo no bg.png' %}" alt="Smokey Peeks logo" class="brand-logo" />
          <span class="brand-text">
            <span class="brand-name">Smokey Peeks</span>
            <span class="brand-tagline">Merch Collection</span>
          </span>
        </a>
      </div>
    </nav>

    <main class="subpage-main">
      <section class="subpage-hero">
        <h1>Smokey Peeks Merch</h1>
        <p>Rep the smoke with our official ball cap and more coming soon.</p>
        <img
          src="{% static 'main/img/Ball Cap.jpeg' %}"
          alt="Smokey Peeks ball cap"
          style="max-width: 260px; width: 100%; border-radius: 14px; box-shadow: 0 18px 40px rgba(0, 0, 0, 0.8); margin-bottom: 1.5rem;"
        />
        <a href="{% url 'main:home' %}#reservations" class="btn btn-primary">
          Book a table
        </a>
      </section>
    </main>
  </body>
</html>
