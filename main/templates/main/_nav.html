{% load static %}
{# Shared nav for main site pages - include in templates as {% include 'main/_nav.html' %} #}
<header class="top-bar">
  <div class="top-bar-inner">
    <div class="top-bar-left">
      <span class="top-bar-label">Contact us</span>
      <span class="top-bar-phone">0977 469 6618 / 0977 654 4225</span>
    </div>
    <div class="top-bar-right">
      <span class="lang-label">Language:</span>
      <select class="lang-select" aria-label="Select language">
        <option selected>English</option>
        <option>Filipino</option>
        <option>Korean</option>
        <option>German</option>
      </select>
    </div>
  </div>
</header>

<nav class="main-nav">
  <div class="nav-inner">
    <a href="{% url 'main:logadmin' %}" class="brand" title="Admin login">
      <img src="{% static 'main/img/logo no bg.png' %}" alt="Smokey Peeks logo" class="brand-logo" />
      <span class="brand-text">
        <span class="brand-name">Smokey Peeks</span>
        <span class="brand-tagline">Smoke, Sizzle, and Sip the Night Away. </span>
      </span>
    </a>

    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links">
      <li><a href="{% url 'main:home' %}" {% if request.resolver_match.url_name == 'home' %}class="nav-current"{% endif %}>Home</a></li>
      <li><a href="{% url 'main:menu' %}" {% if request.resolver_match.url_name == 'menu' %}class="nav-current"{% endif %}>Menu</a></li>
      <li><a href="{% url 'main:location' %}" {% if request.resolver_match.url_name == 'location' %}class="nav-current"{% endif %}>Location</a></li>
      <li><a href="{% url 'main:reservation' %}" {% if request.resolver_match.url_name == 'reservation' %}class="nav-current"{% endif %}>Reservations</a></li>
      <li><a href="{% url 'main:events' %}" {% if request.resolver_match.url_name == 'events' %}class="nav-current"{% endif %}>Promos &amp; Merch</a></li>
      <li><a href="{% url 'main:about' %}" {% if request.resolver_match.url_name == 'about' %}class="nav-current"{% endif %}>About Us</a></li>
    </ul>
  </div>
</nav>
